---
- hosts: "{{ run_on | default('localhost') }}"
  gather_facts: false
  become: false

  vars:
    id: ol-9
    version: 9.7
    os:
      config:
        disks:
          - 30
        timezone: Australia/Melbourne
      type: linux
      variant: OracleLinux
      iso: http://192.168.1.161:8180/Oracle/OL-9/OracleLinux-R9-U7-x86_64-dvd.iso
      checksum: 895751f157727bca8437607e8edb32b7c10d815aba954f5b3dc24c28ac8a10aa
      console_boot: |
          <up><wait><tab><wait> inst.text inst.ks=http://{{ imagebuilder_localip }}:{{ imagebuilder_localport }}/ks.cfg<enter>

  collections:
    - gocallag.template_builder
  roles:
    - imagebuilder
    - target_proxmox
    - target_vsphere
