  # OpenSuSE-Based Systems
- name: (BUILDAUX, OpenSuSE)
  tags:
      - build_aux
  block:
      - name: (BUILDAUX, OpenSuSE) create build directories
        ansible.builtin.file:
            path: "{{ file }}"
            state: directory
            mode: "0755"
        loop_control:
            loop_var: file
        loop:
            - "{{ build_basedir }}/build"
            - "{{ build_basedir }}/build/mnt"
      - name: (BUILDAUX, OpenSuSE) remove existing aux ISO (if it exists)
        ansible.builtin.file:
            path: "{{ build_basedir }}/build/aux.iso"
            state: absent

      - name: (BUILDAUX, OpenSuSE) create temporary iso contents dir
        ansible.builtin.file:
            path: "{{ build_basedir }}//build/iso_contents"
            state: directory
            mode: "0755"

      - name: (BUILDAUX, OpenSuSE) Copy autoinst.xml file (OpenSuSE) to ISO contents
        ansible.builtin.copy:
            content: "{{ autoinst }}"
            dest: "{{ build_basedir }}/build/iso_contents/autoinst.xml"
            mode: "0644"
        become: true
      - name: (BUILDAUX, OpenSuSE) Copy autoinst.xml file (OpenSuSE) to http directory
        ansible.builtin.copy:
            content: "{{ autoinst }}"
            dest: "{{ build_httpdir }}/profile.jsonnet"
            mode: "0644"
        become: true

      - name: (BUILDAUX, OpenSuSE) Build aux ISO from contents (label OEMDRV)
        ansible.builtin.command: >
          genisoimage -output aux.iso -volid OEMDRV -joliet -rock .
        args:
            chdir: "{{ build_basedir }}/build/iso_contents"
            creates: "{{ build_basedir }}/build/aux.iso"
        register: mkiso # noqa: var-naming
        failed_when: mkiso.rc != 0

      - name: (BUILDAUX, OpenSuSE) Move aux ISO to build directory
        ansible.builtin.command: >
          mv {{ build_basedir }}/build/iso_contents/aux.iso {{ build_basedir }}/build/aux.iso
        args:
            creates: "{{ build_basedir }}/build/aux.iso"

      - name: (BUILDAUX, OpenSuSE) Remove temporary ISO contents directory
        ansible.builtin.file:
            path: "{{ build_basedir }}/build/iso_contents"
            state: absent
        become: true
      - name: (BUILDAUX, opensuse) create sha256 of build profile
        ansible.builtin.set_fact:
            build_profile: # noqa: var-naming
                os_iso: "{{ os.iso }}" # noqa: var-naming
                os_autoinst: "{{ autoinst }}" # noqa: var-naming
      - name: (BUILDAUX, opensuse) create sha256 of build profile
        ansible.builtin.set_fact:
            profile_hash: "{{ build_profile | to_json | hash('sha256') }}" # noqa: var-naming
