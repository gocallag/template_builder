---
- name: (TARGET-VSPHERE) Prepare vSphere VM files (OVA, VMX, VMDK)
  block:
    - name: (TARGET-VSPHERE) Assert required vSphere variables are defined
      ansible.builtin.assert:
        that:
          - imagebuilder_env_vsphere_vcenter is defined and imagebuilder_env_vsphere_vcenter | trim | length > 0
          - imagebuilder_env_vsphere_username is defined and imagebuilder_env_vsphere_username | trim | length > 0
          - imagebuilder_env_vsphere_password is defined and imagebuilder_env_vsphere_password | trim | length > 0
          - imagebuilder_env_vsphere_datacenter is defined and imagebuilder_env_vsphere_datacenter | trim | length > 0
          - imagebuilder_env_vsphere_datastore is defined and imagebuilder_env_vsphere_datastore | trim | length > 0
        fail_msg: "(TARGET-VSPHERE) Missing required variables: vcenter, username, password, datacenter, or datastore"

    - name: Set govc environment variables
      ansible.builtin.set_fact:
        GOVC_ENV: # noqa: var-naming
          GOVC_URL: "{{ imagebuilder_env_vsphere_vcenter }}"
          GOVC_USERNAME: "{{ imagebuilder_env_vsphere_username }}"
          GOVC_PASSWORD: "{{ imagebuilder_env_vsphere_password }}"
          GOVC_DATACENTER: "{{ imagebuilder_env_vsphere_datacenter }}"
          GOVC_INSECURE: 1
    - name: Linux | Prepare VMware artifacts
      when: os_type == "linux"
      block:
        - name: Copy base QCOW for update
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            mode: "0644"
            remote_src: true
          register: target_vsphere_linux_copy_qcow2
        - name: Linux | Show copy result
          ansible.builtin.debug:
            var: target_vsphere_linux_copy_qcow2

        - name: Linux | Install open-vm-tools and prepare PVSCSI / VMXNET3 driver
          ansible.builtin.command: >
            virt-customize
            -a "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            --install open-vm-tools
            --run-command 'echo "add_drivers+= \" vmw_pvscsi \"" > /etc/dracut.conf.d/vmw_pvscsi.conf'
            --run-command 'kver=$(ls /lib/modules | sort -V | tail -1); dracut -f --kver "$kver" --add-drivers "vmw_pvscsi vmxnet3 scsi_mod sd_mod"'
            --run-command 'lsinitrd /boot/initramfs-$(ls /lib/modules | sort -V | tail -1).img | grep vmw || true'
            --run-command 'touch /.autorelabel'
            --selinux-relabel
          register: target_vsphere_linux_customize
          changed_when: true
        - name: Linux | Show virt-customize output
          ansible.builtin.debug:
            var: target_vsphere_linux_customize

        - name: Convert QCOW2 to VMDK (VMware)
          ansible.builtin.command: >
            qemu-img convert
            -f qcow2
            -O vmdk
            -o subformat=monolithicFlat,adapter_type=lsilogic
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
          register: target_vsphere_linux_convert_vmdk
          changed_when: true

        - name: Linux | Check VMDK filesystems
          ansible.builtin.command: >
            virt-filesystems
            -a "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            --all
            --long
            --uuid
          register: target_vsphere_linux_filesystems
          changed_when: false

        - name: Linux | Show virt-filesystems output
          ansible.builtin.debug:
            var: target_vsphere_linux_filesystems.stdout

        - name: Delete old vm first
          ansible.builtin.shell: |
            govc vm.destroy -force "{{ imagebuilder_id_base }}" >/dev/null 2>&1 || true
          environment: "{{ GOVC_ENV }}"
          changed_when: true
          register: target_vsphere_linux_delete_old_vm
        - name: Show delete old VM result
          ansible.builtin.debug:
            var: target_vsphere_linux_delete_old_vm

        - name: Create VM shell (no disk)
          ansible.builtin.shell: |
            govc vm.create \
              -ds "{{ imagebuilder_env_vsphere_datastore }}" \
              -pool "{{ imagebuilder_env_vsphere_resource_pool | default('Resources') }}" \
              -folder "{{ imagebuilder_env_vsphere_folder | default('vm') }}" \
              -m "{{ imagebuilder_env_vsphere_memory_mb | default(4096) }}" \
              -c "{{ imagebuilder_env_vsphere_cpu_count | default(2) }}" \
              -g "{{ imagebuilder_env_vsphere_guestosid | default('other3xLinux64Guest') }}" \
              -on=false \
              "{{ imagebuilder_id_base }}"
            sleep 10
          changed_when: true
          environment: "{{ GOVC_ENV }}"
          register: target_vsphere_linux_create_vm
        - name: Show create VM result
          ansible.builtin.debug:
            var: target_vsphere_linux_create_vm
        - name: List devices
          ansible.builtin.shell: |
            set -o pipefail
            govc device.ls -vm "{{ imagebuilder_id_base }}" | awk '{print $1}' | grep -E "^(ethernet|lsilogic)-" || true
            sleep 10
          environment: "{{ GOVC_ENV }}"
          register: target_vsphere_linux_devices
          changed_when: false
        - name: Show devices
          ansible.builtin.debug:
            var: target_vsphere_linux_devices.stdout_lines
        - name: Remove NIC
          ansible.builtin.shell: |
              govc device.remove -vm "{{ imagebuilder_id_base }}" {{ item }}
              sleep 10
          environment: "{{ GOVC_ENV }}"
          loop: "{{ target_vsphere_linux_devices.stdout_lines | select('search', '^ethernet-') | list }}"
          when: target_vsphere_linux_devices.stdout is search('ethernet-')
          register: target_vsphere_linux_remove_nic
          changed_when: true
        - name: Show remove NIC result
          ansible.builtin.debug:
            var: target_vsphere_linux_remove_nic

        - name: Remove LSILogic controller
          ansible.builtin.shell: |
            govc device.remove -vm "{{ imagebuilder_id_base }}" {{ item }}
            sleep 10
          environment: "{{ GOVC_ENV }}"
          loop: "{{ target_vsphere_linux_devices.stdout_lines | select('search', '^lsilogic-') | list }}"
          when: target_vsphere_linux_devices.stdout is search('lsilogic-')
          register: target_vsphere_linux_remove_scsi
          changed_when: true
        - name: Show remove SCSI controller result
          ansible.builtin.debug:
            var: target_vsphere_linux_remove_scsi

        - name: Fix VMDK descriptor filename
          ansible.builtin.replace:
            path: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            regexp: 'FLAT ".*" 0'
            replace: 'FLAT "{{ imagebuilder_id_base }}-flat.vmdk" 0'

        - name: Upload descriptor VMDK (monolithicFlat)
          ansible.builtin.shell: |
            govc datastore.upload \
              "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk" \
              "{{ imagebuilder_id_base }}/{{ imagebuilder_id_base }}.vmdk"
          environment: "{{ GOVC_ENV }}"
          changed_when: true
          register: target_vsphere_linux_upload_descriptor
        - name: Show upload descriptor result
          ansible.builtin.debug:
            var: target_vsphere_linux_upload_descriptor


        - name: Upload flat backing file
          ansible.builtin.shell: |
              govc datastore.upload \
              "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}-flat.vmdk" \
              "{{ imagebuilder_id_base }}/{{ imagebuilder_id_base }}-flat.vmdk"
              sleep 20
          environment: "{{ GOVC_ENV }}"
          changed_when: true
          register: target_vsphere_linux_upload_flat

        - name: Show upload flat backing file result
          ansible.builtin.debug:
            var: target_vsphere_linux_upload_flat

        - name: Add PVSCSI controller
          ansible.builtin.shell: |
              govc device.scsi.add -vm "{{ imagebuilder_id_base }}" -type pvscsi
              sleep 10
          environment: "{{ GOVC_ENV }}"
          register: target_vsphere_linux_add_pvscsi
          changed_when: true

        - name: Attach disk to PVSCSI
          ansible.builtin.shell: |
              govc vm.disk.attach \
              -vm "{{ imagebuilder_id_base }}" \
              -disk "[{{ imagebuilder_env_vsphere_datastore }}] {{ imagebuilder_id_base }}/{{ imagebuilder_id_base }}.vmdk" \
              -controller "{{ target_vsphere_linux_add_pvscsi.stdout }}"
              sleep 10
          environment: "{{ GOVC_ENV }}"
          register: target_vsphere_linux_attach_disk
          changed_when: true
        - name: Show attach disk result
          ansible.builtin.debug:
            var: target_vsphere_linux_attach_disk


        - name: Add network interface
          ansible.builtin.shell: |
              govc vm.network.add \
              -vm "{{ imagebuilder_id_base }}" \
              -net "{{ imagebuilder_env_vsphere_network | default('VM Network') }}" \
              -net.adapter vmxnet3
              sleep 10
          environment: "{{ GOVC_ENV }}"
          changed_when: true
          register: target_vsphere_linux_add_network
        - name: Show add network result
          ansible.builtin.debug:
            var: target_vsphere_linux_add_network

    ###########################################################################
    # WINDOWS PATH
    ###########################################################################
    - name: Windows | Prepare VMware artifacts
      when: os_type == "windows"
      block:
        - name: Windows | Copy base QCOW for update
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            remote_src: true
            mode: "0644"

        - name: Windows | Convert QCOW2 → VMDK (VMware)
          ansible.builtin.command: >
            qemu-img convert
            -O vmdk
            -o subformat=streamOptimized,adapter_type=lsilogic
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
          register: target_vsphere_windows_convert_vmdk
          changed_when: true

        - name: Windows | Show conversion output
          ansible.builtin.debug:
            var: target_vsphere_windows_convert_vmdk.stdout

        - name: Windows | Ensure VMDK exists
          ansible.builtin.stat:
            path: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
          register: target_vsphere_windows_vmdk_stat
          failed_when: not target_vsphere_windows_vmdk_stat.stat.exists

        - name: Windows | Copy VMDK to standardized location
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmdk"
            remote_src: true
            mode: "0644"

        - name: Windows | Show VMDK path
          ansible.builtin.debug:
            msg: "VMDK created: {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmdk"

        - name: Windows | Render VMX configuration file
          ansible.builtin.template:
            src: "vmx-template.j2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmx"
            mode: "0644"
          vars:
            vmx_name: "{{ imagebuilder_id_base }}"
            vmx_vmdk_filename: "{{ imagebuilder_id_base }}.vmdk"

        - name: Windows | Show VMX path
          ansible.builtin.debug:
            msg: "VMX created: {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmx"

        # =====================================================================
        # UPLOAD TO VCENTER USING GOVC
        # =====================================================================
        - name: Windows | Upload VMX and VMDK to vCenter
          ansible.builtin.shell: |
            export GOVC_URL="{{ vsphere_server }}"
            export GOVC_USERNAME="{{ vsphere_username }}"
            export GOVC_PASSWORD="{{ vsphere_password }}"
            export GOVC_DATACENTER="{{ vsphere_datacenter }}"
            export GOVC_DATASTORE="{{ vsphere_datastore }}"
            export GOVC_INSECURE=1

            govc datastore.upload "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmx" "{{ vsphere_upload_path }}/{{ imagebuilder_id_base }}.vmx"
            govc datastore.upload "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmdk" "{{ vsphere_upload_path }}/{{ imagebuilder_id_base }}.vmdk"
          environment:
            GOVC_URL: "{{ vsphere_server }}"
            GOVC_USERNAME: "{{ vsphere_username }}"
            GOVC_PASSWORD: "{{ vsphere_password }}"
            GOVC_DATACENTER: "{{ vsphere_datacenter }}"
            GOVC_DATASTORE: "{{ vsphere_datastore }}"
            GOVC_INSECURE: "1"
          register: target_vsphere_windows_govc_upload
          changed_when: true
          when:
            - vsphere_server is defined
            - vsphere_username is defined
            - vsphere_password is defined
            - vsphere_datacenter is defined
            - vsphere_datastore is defined
            - vsphere_upload_path is defined
          no_log: true

        - name: Windows | Show govc upload result
          ansible.builtin.debug:
            msg: "VMX and VMDK uploaded to {{ vsphere_upload_path }}"
          when:
            - target_vsphere_windows_govc_upload is defined
            - target_vsphere_windows_govc_upload.changed

        - name: Windows | Import VMDK into vCenter using govc
          ansible.builtin.shell: |
            export GOVC_URL="{{ vsphere_server }}"
            export GOVC_USERNAME="{{ vsphere_username }}"
            export GOVC_PASSWORD="{{ vsphere_password }}"
            export GOVC_DATACENTER="{{ vsphere_datacenter }}"
            export GOVC_DATASTORE="{{ vsphere_datastore }}"
            export GOVC_INSECURE=1

            govc import.vmdk \
              -ds "{{ vsphere_datastore }}" \
              -pool "{{ vsphere_resource_pool | default('Resources') }}" \
              -folder "{{ vsphere_folder | default('vm') }}" \
              -name "{{ vsphere_vm_name | default(id) }}" \
              "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmdk"
          environment:
            GOVC_URL: "{{ vsphere_server }}"
            GOVC_USERNAME: "{{ vsphere_username }}"
            GOVC_PASSWORD: "{{ vsphere_password }}"
            GOVC_DATACENTER: "{{ vsphere_datacenter }}"
            GOVC_DATASTORE: "{{ vsphere_datastore }}"
            GOVC_INSECURE: "1"
          register: target_vsphere_windows_govc_import
          changed_when: true
          when:
            - vsphere_server is defined
            - vsphere_username is defined
            - vsphere_password is defined
            - vsphere_datacenter is defined
            - vsphere_datastore is defined
          no_log: true

        - name: Windows | Show govc import result
          ansible.builtin.debug:
            msg: "VMDK imported into vCenter as {{ vsphere_vm_name | default(id) }}"
          when:
            - target_vsphere_windows_govc_import is defined
            - target_vsphere_windows_govc_import.changed

        - name: Windows | Render OVF (UEFI + PVSCSI + VMXNET3)
          ansible.builtin.template:
            src: "ovf-template.j2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.ovf"
            mode: "0644"
          vars:
            ovf_id: "{{ imagebuilder_id_base }}"
            ovf_vmdk: "{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            ovf_size: "{{ target_vsphere_windows_vmdk_stat.stat.size }}"

        - name: Build OVA archive
          community.general.archive:
            path:
              - "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.ovf"
              - "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.ova"
            format: tar
            mode: 644
            force_archive: true
          changed_when: true

        - name: Windows | Show OVA path
          ansible.builtin.debug:
            msg: "OVA created: {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.ova"

        - name: Windows | Display all vSphere artifacts created
          ansible.builtin.debug:
            msg: |
              vSphere artifacts ready for deployment:
                OVA (for import):  {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.ova
                VMX (config file): {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmx
                VMDK (disk image): {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.vmdk

  rescue:
    - name: Rescue on failure
      ansible.builtin.debug:
        msg: "Rescue: error during vSphere template preparation"

