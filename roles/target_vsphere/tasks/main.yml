---
- name: (TARGET-VSPHERE) Prepare vSphere VM files (OVA, VMX, VMDK)
  tags:
    - build_targets
    - build_target_vsphere
  block:

    - name: Validate OS family
      ansible.builtin.fail:
        msg: "os.type must be 'linux' or 'windows'"
      when: os.type not in ["linux", "windows"]

    ###########################################################################
    # LINUX PATH
    ###########################################################################
    - name: Linux | Prepare VMware artifacts
      when: os.type == "linux"
      block:
        - name: Copy base QCOW for update
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ id }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            remote_src: true
            mode: "0644"

        - name: Linux | Install open-vm-tools for VMware
          ansible.builtin.command: >
            virt-customize
            -a "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            --install open-vm-tools
            --run-command 'systemctl enable vmtoolsd.service || true'
            --run-command 'systemctl enable vmware-vmblock-fuse.service || true'
            --selinux-relabel
          register: target_vsphere_linux_customize
          changed_when: true

        - name: Linux | Show virt-customize output
          ansible.builtin.debug:
            var: target_vsphere_linux_customize.stdout

        - name: Convert QCOW2 to VMDK (VMware)
          ansible.builtin.command: >
            qemu-img convert
            -f qcow2
            -O vmdk
            -o subformat=streamOptimized,adapter_type=lsilogic
            "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
          register: target_vsphere_linux_convert_vmdk
          changed_when: true

        - name: Linux | Check VMDK filesystems
          ansible.builtin.command: >
            virt-filesystems
            -a "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            --all
            --long
            --uuid
          register: target_vsphere_linux_filesystems
          changed_when: false

        - name: Linux | Show virt-filesystems output
          ansible.builtin.debug:
            var: target_vsphere_linux_filesystems.stdout

        - name: Linux | Show conversion output
          ansible.builtin.debug:
            var: target_vsphere_linux_convert_vmdk.stdout

        - name: Ensure VMDK exists
          ansible.builtin.stat:
            path: "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
          register: target_vsphere_linux_vmdk_stat
          failed_when: not target_vsphere_linux_vmdk_stat.stat.exists

        # =====================================================================
        # CREATE INDIVIDUAL VMDK FILE
        # =====================================================================
        - name: Copy VMDK to standardized location
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.vmdk"
            remote_src: true
            mode: "0644"

        - name: Show VMDK path
          ansible.builtin.debug:
            msg: "VMDK created: {{ imagebuilder_build_savedir }}/{{ id }}.vmdk"

        # =====================================================================
        # CREATE VMX FILE
        # =====================================================================
        - name: Render VMX configuration file
          ansible.builtin.template:
            src: "vmx-template.j2"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.vmx"
            mode: "0644"
          vars:
            vmx_name: "{{ id }}"
            vmx_vmdk_filename: "{{ id }}.vmdk"

        - name: Show VMX path
          ansible.builtin.debug:
            msg: "VMX created: {{ imagebuilder_build_savedir }}/{{ id }}.vmx"

        - name: Set upload path for VMX and VMDK
          ansible.builtin.set_fact:
            target_vsphere_vsphere_upload_path: "{{ imagebuilder_env_vsphere_upload_path | default('') }}/{{ id }}"
        # =====================================================================
        # UPLOAD TO VCENTER USING GOVC
        # =====================================================================
        - name: Upload VMX and VMDK to vCenter
          ansible.builtin.shell: |
            export GOVC_URL="{{ imagebuilder_env_vsphere_vcenter }}"
            export GOVC_USERNAME="{{ imagebuilder_env_vsphere_username }}"
            export GOVC_PASSWORD="{{ imagebuilder_env_vsphere_password }}"
            export GOVC_DATACENTER="{{ imagebuilder_env_vsphere_datacenter }}"
            export GOVC_DATASTORE="{{ imagebuilder_env_vsphere_datastore }}"
            export GOVC_INSECURE=1

            govc datastore.upload "{{ imagebuilder_build_savedir }}/{{ id }}.vmx" "{{ target_vsphere_vsphere_upload_path }}/{{ id }}.vmx"
          environment:
            GOVC_URL: "{{ imagebuilder_env_vsphere_vcenter }}"
            GOVC_USERNAME: "{{ imagebuilder_env_vsphere_username }}"
            GOVC_PASSWORD: "{{ imagebuilder_env_vsphere_password }}"
            GOVC_DATACENTER: "{{ imagebuilder_env_vsphere_datacenter }}"
            GOVC_DATASTORE: "{{ imagebuilder_env_vsphere_datastore }}"
            GOVC_INSECURE: "1"
          register: target_vsphere_linux_govc_upload
          changed_when: true
          when:
            - imagebuilder_env_vsphere_vcenter is defined
            - imagebuilder_env_vsphere_username is defined
            - imagebuilder_env_vsphere_password is defined
            - imagebuilder_env_vsphere_datacenter is defined
            - imagebuilder_env_vsphere_datastore is defined
            - imagebuilder_env_vsphere_upload_path is defined
          # no_log: true

        - name: Show govc upload result (Linux)
          ansible.builtin.debug:
            msg: "VMX and VMDK uploaded to {{ target_vsphere_vsphere_upload_path }}"
          when:
            - target_vsphere_linux_govc_upload is defined
            - target_vsphere_linux_govc_upload.changed

        - name: Import VMDK into vCenter using govc
          ansible.builtin.shell: |
            export GOVC_URL="{{ imagebuilder_env_vsphere_vcenter }}"
            export GOVC_USERNAME="{{ imagebuilder_env_vsphere_username }}"
            export GOVC_PASSWORD="{{ imagebuilder_env_vsphere_password }}"
            export GOVC_DATACENTER="{{ imagebuilder_env_vsphere_datacenter }}"
            export GOVC_DATASTORE="{{ imagebuilder_env_vsphere_datastore }}"
            export GOVC_INSECURE=1

            govc import.vmdk \
              -ds "{{ imagebuilder_env_vsphere_datastore }}" \
              -pool "{{ imagebuilder_env_vsphere_resource_pool | default('Resources') }}" \
              -folder "{{ imagebuilder_env_vsphere_folder | default('vm') }}" \
              "{{ imagebuilder_build_savedir }}/{{ id }}.vmdk"
          environment:
            GOVC_URL: "{{ imagebuilder_env_vsphere_vcenter }}"
            GOVC_USERNAME: "{{ imagebuilder_env_vsphere_username }}"
            GOVC_PASSWORD: "{{ imagebuilder_env_vsphere_password }}"
            GOVC_DATACENTER: "{{ imagebuilder_env_vsphere_datacenter }}"
            GOVC_DATASTORE: "{{ imagebuilder_env_vsphere_datastore }}"
            GOVC_INSECURE: "1"
          register: target_vsphere_linux_govc_import
          changed_when: true
          when:
            - imagebuilder_env_vsphere_vcenter is defined
            - imagebuilder_env_vsphere_username is defined
            - imagebuilder_env_vsphere_password is defined
            - imagebuilder_env_vsphere_datacenter is defined
            - imagebuilder_env_vsphere_datastore is defined
          # no_log: true

        - name: Show govc import result (Linux)
          ansible.builtin.debug:
            msg: "VMDK imported into vCenter as {{ imagebuilder_env_vsphere_vm_name | default(id) }}"
          when:
            - target_vsphere_linux_govc_import is defined
            - target_vsphere_linux_govc_import.changed

        - name: Create VM
          ansible.builtin.shell: |
            export GOVC_URL="{{ imagebuilder_env_vsphere_vcenter }}"
            export GOVC_USERNAME="{{ imagebuilder_env_vsphere_username }}"
            export GOVC_PASSWORD="{{ imagebuilder_env_vsphere_password }}"
            export GOVC_DATACENTER="{{ imagebuilder_env_vsphere_datacenter }}"
            export GOVC_DATASTORE="{{ imagebuilder_env_vsphere_datastore }}"
            export GOVC_INSECURE=1

            govc vm.create \
              -ds "{{ imagebuilder_env_vsphere_datastore }}" \
              -pool "{{ imagebuilder_env_vsphere_resource_pool | default('Resources') }}" \
              -folder "{{ imagebuilder_env_vsphere_folder | default('vm') }}" \
              -disk "{{ id }}.vmdk" \
              "{{ vsphere_vm_name | default(id) }}"

          environment:
            GOVC_URL: "{{ imagebuilder_env_vsphere_vcenter }}"
            GOVC_USERNAME: "{{ imagebuilder_env_vsphere_username }}"
            GOVC_PASSWORD: "{{ imagebuilder_env_vsphere_password }}"
            GOVC_DATACENTER: "{{ imagebuilder_env_vsphere_datacenter }}"
            GOVC_DATASTORE: "{{ imagebuilder_env_vsphere_datastore }}"
            GOVC_INSECURE: "1"
          register: target_vsphere_linux_govc_vmcreate
          changed_when: true
          when:
            - imagebuilder_env_vsphere_vcenter is defined
            - imagebuilder_env_vsphere_username is defined
            - imagebuilder_env_vsphere_password is defined
            - imagebuilder_env_vsphere_datacenter is defined
            - imagebuilder_env_vsphere_datastore is defined
          # no_log: true

        - name: Show govc vm.create result (Linux)
          ansible.builtin.debug:
            msg: "VM created in vCenter as {{ imagebuilder_env_vsphere_vm_name | default(id) }}"
          when:
            - target_vsphere_linux_govc_vmcreate is defined
            - target_vsphere_linux_govc_vmcreate.changed
        # =====================================================================
        # CREATE OVA ARCHIVE
        # =====================================================================
        - name: Render OVF (UEFI + PVSCSI + VMXNET3)
          ansible.builtin.template:
            src: "ovf-template.j2"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.ovf"
            mode: "0644"
          vars:
            ovf_id: "{{ id }}"
            ovf_vmdk: "{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            ovf_size: "{{ target_vsphere_linux_vmdk_stat.stat.size }}"

        - name: Build OVA archive
          community.general.archive:
            path:
              - "{{ imagebuilder_build_savedir }}/{{ id }}.ovf"
              - "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.ova"
            format: tar
            mode: 644
            force_archive: true
          changed_when: true

        - name: Show OVA path
          ansible.builtin.debug:
            msg: "OVA created: {{ imagebuilder_build_savedir }}/{{ id }}.ova"

        # =====================================================================
        # SUMMARY OF vSPHERE ARTIFACTS
        # =====================================================================
        - name: Display all vSphere artifacts created
          ansible.builtin.debug:
            msg: |
              vSphere artifacts ready for deployment:
                OVA (for import):  {{ imagebuilder_build_savedir }}/{{ id }}.ova
                VMX (config file): {{ imagebuilder_build_savedir }}/{{ id }}.vmx
                VMDK (disk image): {{ imagebuilder_build_savedir }}/{{ id }}.vmdk
    ###########################################################################
    # WINDOWS PATH
    ###########################################################################
    - name: Windows | Prepare VMware artifacts
      when: os.type == "windows"
      block:
        - name: Windows | Copy base QCOW for update
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ id }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            remote_src: true
            mode: "0644"

        - name: Windows | Convert QCOW2 → VMDK (VMware)
          ansible.builtin.command: >
            qemu-img convert
            -O vmdk
            -o subformat=streamOptimized,adapter_type=lsilogic
            "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
          register: target_vsphere_windows_convert_vmdk
          changed_when: true

        - name: Windows | Show conversion output
          ansible.builtin.debug:
            var: target_vsphere_windows_convert_vmdk.stdout

        - name: Windows | Ensure VMDK exists
          ansible.builtin.stat:
            path: "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
          register: target_vsphere_windows_vmdk_stat
          failed_when: not target_vsphere_windows_vmdk_stat.stat.exists

        - name: Windows | Copy VMDK to standardized location
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.vmdk"
            remote_src: true
            mode: "0644"

        - name: Windows | Show VMDK path
          ansible.builtin.debug:
            msg: "VMDK created: {{ imagebuilder_build_savedir }}/{{ id }}.vmdk"

        - name: Windows | Render VMX configuration file
          ansible.builtin.template:
            src: "vmx-template.j2"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.vmx"
            mode: "0644"
          vars:
            vmx_name: "{{ id }}"
            vmx_vmdk_filename: "{{ id }}.vmdk"

        - name: Windows | Show VMX path
          ansible.builtin.debug:
            msg: "VMX created: {{ imagebuilder_build_savedir }}/{{ id }}.vmx"

        # =====================================================================
        # UPLOAD TO VCENTER USING GOVC
        # =====================================================================
        - name: Windows | Upload VMX and VMDK to vCenter
          ansible.builtin.shell: |
            export GOVC_URL="{{ vsphere_server }}"
            export GOVC_USERNAME="{{ vsphere_username }}"
            export GOVC_PASSWORD="{{ vsphere_password }}"
            export GOVC_DATACENTER="{{ vsphere_datacenter }}"
            export GOVC_DATASTORE="{{ vsphere_datastore }}"
            export GOVC_INSECURE=1

            govc datastore.upload "{{ imagebuilder_build_savedir }}/{{ id }}.vmx" "{{ vsphere_upload_path }}/{{ id }}.vmx"
            govc datastore.upload "{{ imagebuilder_build_savedir }}/{{ id }}.vmdk" "{{ vsphere_upload_path }}/{{ id }}.vmdk"
          environment:
            GOVC_URL: "{{ vsphere_server }}"
            GOVC_USERNAME: "{{ vsphere_username }}"
            GOVC_PASSWORD: "{{ vsphere_password }}"
            GOVC_DATACENTER: "{{ vsphere_datacenter }}"
            GOVC_DATASTORE: "{{ vsphere_datastore }}"
            GOVC_INSECURE: "1"
          register: target_vsphere_windows_govc_upload
          changed_when: true
          when:
            - vsphere_server is defined
            - vsphere_username is defined
            - vsphere_password is defined
            - vsphere_datacenter is defined
            - vsphere_datastore is defined
            - vsphere_upload_path is defined
          no_log: true

        - name: Windows | Show govc upload result
          ansible.builtin.debug:
            msg: "VMX and VMDK uploaded to {{ vsphere_upload_path }}"
          when:
            - target_vsphere_windows_govc_upload is defined
            - target_vsphere_windows_govc_upload.changed

        - name: Windows | Import VMDK into vCenter using govc
          ansible.builtin.shell: |
            export GOVC_URL="{{ vsphere_server }}"
            export GOVC_USERNAME="{{ vsphere_username }}"
            export GOVC_PASSWORD="{{ vsphere_password }}"
            export GOVC_DATACENTER="{{ vsphere_datacenter }}"
            export GOVC_DATASTORE="{{ vsphere_datastore }}"
            export GOVC_INSECURE=1

            govc import.vmdk \
              -ds "{{ vsphere_datastore }}" \
              -pool "{{ vsphere_resource_pool | default('Resources') }}" \
              -folder "{{ vsphere_folder | default('vm') }}" \
              -name "{{ vsphere_vm_name | default(id) }}" \
              "{{ imagebuilder_build_savedir }}/{{ id }}.vmdk"
          environment:
            GOVC_URL: "{{ vsphere_server }}"
            GOVC_USERNAME: "{{ vsphere_username }}"
            GOVC_PASSWORD: "{{ vsphere_password }}"
            GOVC_DATACENTER: "{{ vsphere_datacenter }}"
            GOVC_DATASTORE: "{{ vsphere_datastore }}"
            GOVC_INSECURE: "1"
          register: target_vsphere_windows_govc_import
          changed_when: true
          when:
            - vsphere_server is defined
            - vsphere_username is defined
            - vsphere_password is defined
            - vsphere_datacenter is defined
            - vsphere_datastore is defined
          no_log: true

        - name: Windows | Show govc import result
          ansible.builtin.debug:
            msg: "VMDK imported into vCenter as {{ vsphere_vm_name | default(id) }}"
          when:
            - target_vsphere_windows_govc_import is defined
            - target_vsphere_windows_govc_import.changed

        - name: Windows | Render OVF (UEFI + PVSCSI + VMXNET3)
          ansible.builtin.template:
            src: "ovf-template.j2"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.ovf"
            mode: "0644"
          vars:
            ovf_id: "{{ id }}"
            ovf_vmdk: "{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            ovf_size: "{{ target_vsphere_windows_vmdk_stat.stat.size }}"

        - name: Build OVA archive
          community.general.archive:
            path:
              - "{{ imagebuilder_build_savedir }}/{{ id }}.ovf"
              - "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.vmdk"
            dest: "{{ imagebuilder_build_savedir }}/{{ id }}.ova"
            format: tar
            mode: 644
            force_archive: true
          changed_when: true

        - name: Windows | Show OVA path
          ansible.builtin.debug:
            msg: "OVA created: {{ imagebuilder_build_savedir }}/{{ id }}.ova"

        - name: Windows | Display all vSphere artifacts created
          ansible.builtin.debug:
            msg: |
              vSphere artifacts ready for deployment:
                OVA (for import):  {{ imagebuilder_build_savedir }}/{{ id }}.ova
                VMX (config file): {{ imagebuilder_build_savedir }}/{{ id }}.vmx
                VMDK (disk image): {{ imagebuilder_build_savedir }}/{{ id }}.vmdk

  rescue:
    - name: Rescue on failure
      ansible.builtin.debug:
        msg: "Rescue: error during vSphere template preparation"

  always:
    - name: Cleanup temporary QCOW2 working files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ imagebuilder_build_savedir }}/{{ id }}.vmware.{{ imagebuilder_profile_hash }}.qcow2"
