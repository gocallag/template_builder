---
- name: (TARGET-OCI) Prepare and convert templates to OCI Compute format
  tags:
    - build_targets
    - build_target_oci
  block:

    - name: Validate OS family
      ansible.builtin.fail:
        msg: "os_type must be 'linux' or 'windows'"
      when: os_type not in ["linux", "windows"]

    - name: (TARGET-OCI) Assert required OCI variables are defined
      ansible.builtin.assert:
        that:
          - imagebuilder_env_oci_compartment_ocid is defined and imagebuilder_env_oci_compartment_ocid | trim | length > 0
          - imagebuilder_env_oci_bucket is defined and imagebuilder_env_oci_bucket | trim | length > 0
        fail_msg: "(TARGET-OCI) Missing required variables: oci_compartment_ocid or oci_bucket"

    ###########################################################################
    # LINUX PATH
    ###########################################################################
    - name: Linux | Prepare OCI Linux Agent and drivers
      when: os_type == "linux"
      block:

        - name: Linux | Copy base QCOW2 for OCI
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.oci.{{ imagebuilder_profile_hash }}.qcow2"
            mode: "0644"
            remote_src: true

        - name: Linux | Install OCI Linux Agent and utilities
          ansible.builtin.command: >
            virt-customize
            -a "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.oci.{{ imagebuilder_profile_hash }}.qcow2"
            --install oracle-cloud-agent,oracle-linux-kernel-module-enic,curl,wget
            --run-command 'systemctl enable oracle-cloud-agent || systemctl enable oracle-agent || true'
            --run-command 'echo "add_drivers+= \" virtio virtio_blk virtio_net enic \"" > /etc/dracut.conf.d/oci.conf'
            --run-command 'kver=$(ls /lib/modules | sort -V | tail -1); dracut -f --kver "$kver" --add-drivers "virtio virtio_blk virtio_net enic" 2>&1 || true'
            --run-command 'touch /.autorelabel'
            --selinux-relabel
          register: target_oci_linux_customize
          changed_when: true

        - name: Linux | Show virt-customize output
          ansible.builtin.debug:
            var: target_oci_linux_customize.stdout

        - name: Linux | Convert QCOW2 to raw (OCI format)
          ansible.builtin.command: >
            qemu-img convert
            -f qcow2
            -O raw
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.oci.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
          register: target_oci_linux_convert
          changed_when: true

        - name: Linux | Show conversion output
          ansible.builtin.debug:
            var: target_oci_linux_convert.stdout

    ###########################################################################
    # WINDOWS PATH
    ###########################################################################
    - name: Windows | Prepare Windows for OCI Compute
      when: os_type == "windows"
      block:

        - name: Windows | Copy base QCOW2 for OCI
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.oci.{{ imagebuilder_profile_hash }}.qcow2"
            mode: "0644"
            remote_src: true

        - name: Windows | Prepare OCI metadata configuration
          ansible.builtin.copy:
            dest: "/tmp/oci-config.ps1"
            mode: "0644"
            content: |
              # OCI Windows Configuration
              Write-Host "Configuring Windows for OCI Compute..."

              # Enable required Windows features
              $features = @(
                  'NetFx4ServerFeatures',
                  'NetFx4',
                  'MSMQ-Server',
                  'BITS-IIS-Ext'
              )

              foreach ($feature in $features) {
                  try {
                      Install-WindowsFeature $feature -NoRestart -ErrorAction SilentlyContinue | Out-Null
                      Write-Host "Enabled: $feature"
                  } catch {
                      Write-Host "Feature $feature not available: $_"
                  }
              }

              # Set up for OCI metadata service
              Write-Host "Configuring for OCI metadata service..."

              Write-Host "OCI Windows configuration completed"

        - name: Windows | Render unattend.xml
          ansible.builtin.template:
            src: "{{ windows_unattend_template }}"
            dest: "/tmp/unattend.xml"
            mode: "0644"

        - name: Windows | Copy Windows guestfish injection helper
          ansible.builtin.copy:
            src: "roles/imagebuilder/files/windows-guestfish-inject.sh"
            dest: "/tmp/windows-guestfish-inject.sh"
            mode: "0755"
          delegate_to: "{{ run_on | default('localhost') }}"

        - name: Windows | Inject OCI configuration + unattend.xml
          ansible.builtin.command: >
            /tmp/windows-guestfish-inject.sh
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.oci.{{ imagebuilder_profile_hash }}.qcow2"
            "/tmp/unattend.xml:/Windows/Panther/Unattend.xml"
            "/tmp/oci-config.ps1:/Windows/Temp/oci-config.ps1"
          register: target_oci_windows_inject
          changed_when: true
          delegate_to: "{{ run_on | default('localhost') }}"

        - name: Windows | Show guestfish output
          ansible.builtin.debug:
            var: target_oci_windows_inject.stdout

        - name: Windows | Convert QCOW2 to raw (OCI format)
          ansible.builtin.command: >
            qemu-img convert
            -f qcow2
            -O raw
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.oci.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
          register: target_oci_windows_convert
          changed_when: true

        - name: Windows | Show conversion output
          ansible.builtin.debug:
            var: target_oci_windows_convert.stdout

    ###########################################################################
    # VALIDATION AND OUTPUT
    ###########################################################################

    - name: Validate converted raw image
      ansible.builtin.stat:
        path: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
      register: target_oci_oci_image_stat

    - name: Show OCI raw image details
      ansible.builtin.debug:
        msg: |
          OCI Compute Image Created Successfully!
          Path: {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw
          Size: {{ (target_oci_oci_image_stat.stat.size / 1024 / 1024 / 1024) | round(2) }} GB
          OS Type: {{ os_type | capitalize }}

          Next steps to create OCI Custom Image:
          1. Upload to Object Storage: oci os object put --bucket-name {{ imagebuilder_env_oci_bucket }} --file {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw --name {{ imagebuilder_id_base }}.raw
          2. Create image from IMPDP: oci compute image import-from-object-storage --compartment-id {{ imagebuilder_env_oci_compartment_ocid }} --display-name {{ imagebuilder_id_base }} --uri https://objectstorage.{{ imagebuilder_env_oci_region }}.oraclecloud.com/n/{{ imagebuilder_env_oci_namespace }}/b/{{ imagebuilder_env_oci_bucket }}/o/{{ imagebuilder_id_base }}.raw --launch-mode NATIVE
          3. Create instance: oci compute instance launch --compartment-id {{ imagebuilder_env_oci_compartment_ocid }} --image-id <image-id> --shape VM.Standard2.1
      when: target_oci_oci_image_stat.stat.exists

    - name: Fail if image was not created
      ansible.builtin.fail:
        msg: "Failed to create OCI raw image at {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
      when: not oci_image_stat.stat.exists

  rescue:
    - name: (TARGET-OCI) Rescue on failure
      ansible.builtin.debug:
        msg: "Rescue: error during OCI image creation"

  always:
    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/windows-guestfish-inject.sh"
        - "/tmp/oci-config.script"
        - "/tmp/oci-config.ps1"
        - "/tmp/unattend.xml"
      ignore_errors: true # noqa: ignore-errors

    - name: Remove intermediate QCOW2
      ansible.builtin.file:
        path: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.oci.{{ imagebuilder_profile_hash }}.qcow2"
        state: absent
      ignore_errors: true # noqa: ignore-errors
