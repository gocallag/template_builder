---
- name: (TARGET-PROXMOX) Upload template to Proxmox server
  tags:
    - build_targets
    - build_target_proxmox
  vars:
    target_host: "{{ run_on | default('localhost') }}"
    proxmox_api_base: &proxmox_api_base
      api_user: "{{ imagebuilder_env_proxmox_user }}@pam"
      api_password: "{{ imagebuilder_env_proxmox_password }}"
      api_host: "{{ imagebuilder_env_proxmox_server }}"
      timeout: 600
  block:
    - name: Add the host for the Proxmox server
      ansible.builtin.add_host:
        name: proxmox_server
        ansible_host: "{{ imagebuilder_env_proxmox_server }}"
        ansible_port: 22
        ansible_user: "{{ imagebuilder_env_proxmox_user }}"
        ansible_password: "{{ imagebuilder_env_proxmox_password }}"
        ansible_connection: ssh

    - name: Validate OS family
      ansible.builtin.fail:
        msg: "os_type must be 'linux' or 'windows'"
      when: os_type not in ["linux", "windows"]
    - name: Include the virt-customise tasks
      ansible.builtin.include_tasks: "{{ os_type }}.yml"
    - name: Convert QCOW2 to VirtIO-ready QCOW2
      ansible.builtin.command: >
        qemu-img convert -S 0 -O qcow2
        "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
        "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.virtio.{{ imagebuilder_profile_hash }}.qcow2"
      register: convert
      changed_when: true

    - name: Ensure the destination directory exists on the Proxmox server
      ansible.builtin.file:
        path: "/mnt/pve/{{ imagebuilder_env_proxmox_storage }}/tmp/{{ imagebuilder_id_base }}"
        state: directory
        mode: "0755"
      delegate_to: proxmox_server
      become: true

    - name: Build SCP command as array
      ansible.builtin.set_fact:
        scp_cmd: # noqa: var-naming
          - sshpass
          - "-p"
          - "{{ imagebuilder_env_proxmox_password }}"
          - scp
          - "-q"
          - "-C"
          - "-P"
          - "22"
          - "-o"
          - "StrictHostKeyChecking=no"
          - "-o"
          - "UserKnownHostsFile=/dev/null"
          - "-o"
          - "ServerAliveInterval=30"
          - "-o"
          - "ServerAliveCountMax=120"
          - "-o"
          - "TCPKeepAlive=yes"
          - "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.virtio.{{ imagebuilder_profile_hash }}.qcow2"
          - "{{ imagebuilder_env_proxmox_user }}@{{ imagebuilder_env_proxmox_server }}:/mnt/pve/{{ imagebuilder_env_proxmox_storage }}/tmp/{{ imagebuilder_id_base }}/{{ imagebuilder_id_base }}.qcow2"

    - name: Copy large file in async
      ansible.builtin.command: "{{ scp_cmd | join(' ') }}"
      async: 3600
      poll: 0
      register: copy_sleeper # noqa: var-naming
      changed_when: true
      delegate_to: "{{ target_host }}"

    - name: Check if async task has finished
      ansible.builtin.async_status:
        jid: "{{ copy_sleeper.ansible_job_id }}"
      register: job_result # noqa: var-naming
      until: job_result.finished
      retries: 720
      delay: 5
      delegate_to: "{{ run_on | default('localhost') }}"

    - name: Delete template if it exists
      community.proxmox.proxmox_kvm:
        <<: *proxmox_api_base
        node: "{{ imagebuilder_env_proxmox_node }}"
        name: "template-{{ imagebuilder_id_base }}"
        state: absent
      delegate_to: "{{ target_host }}"
      ignore_errors: true # noqa: ignore-errors

    - name: Create new VM
      community.proxmox.proxmox_kvm:
        <<: *proxmox_api_base
        node: "{{ imagebuilder_env_proxmox_node }}"
        name: "template-{{ imagebuilder_id_base }}"
        cores: "1"
        vcpus: "1"
        cpu: "host"
        memory: "{{ imagebuilder_env_build_memory }}"
        agent: true
        net:
          net0: 'virtio,bridge=vmbr0'
        description: |
          Template built on {{ ansible_date_time.iso8601 }}
          Build ID: {{ imagebuilder_id_base }}
          Built by: {{ imagebuilder_env_ansible_user }}
          Source: Proxmox automation pipeline
      delegate_to: "{{ target_host }}"
      register: nvm # noqa: var-naming

    - name: Add existing disk
      community.proxmox.proxmox_disk:
        <<: *proxmox_api_base
        vmid: "{{ nvm.vmid }}"
        name: "{{ imagebuilder_id_base }}"
        disk: virtio0
        storage: "{{ imagebuilder_env_proxmox_storage }}"
        import_from: "/mnt/pve/{{ imagebuilder_env_proxmox_storage }}/tmp/{{ imagebuilder_id_base }}/{{ imagebuilder_id_base }}.qcow2"
        state: present
      delegate_to: "{{ target_host }}"

    - name: Update VM boot order
      community.proxmox.proxmox_kvm:
        <<: *proxmox_api_base
        node: "{{ imagebuilder_env_proxmox_node }}"
        name: "template-{{ imagebuilder_id_base }}"
        boot: "order=virtio0"
        update: true
      delegate_to: "{{ target_host }}"

    # - name: Set VM notes
    #   community.proxmox.proxmox_kvm:
    #     api_user: "{{ imagebuilder_env_proxmox_user }}@pam"
    #     api_password: "{{ imagebuilder_env_proxmox_password }}"
    #     api_host: "{{ imagebuilder_env_proxmox_server }}"
    #     node: "{{ imagebuilder_env_proxmox_node }}"
    #     name: "template-{{ imagebuilder_id_base }}"
    #     update: true
    #     description: |
    #       Template built on {{ ansible_date_time.iso8601 }}
    #       Build ID: {{ imagebuilder_id_base }}
    #       Built by: {{ imagebuilder_env_ansible_user }}
    #       Source: Proxmox automation pipeline
    #   delegate_to: "{{ run_on | default('localhost') }}"
    - name: Update VM to template
      community.proxmox.proxmox_kvm:
        <<: *proxmox_api_base
        node: "{{ imagebuilder_env_proxmox_node }}"
        name: "template-{{ imagebuilder_id_base }}"
        update: true
        state: template
      delegate_to: "{{ target_host }}"

  rescue:
    - name: Rescue on failure
      ansible.builtin.debug:
        msg: "Rescue: error during Proxmox template upload"

  always:
    - name: Remove the directory on the Proxmox server
      ansible.builtin.file:
        path: "/mnt/pve/{{ imagebuilder_env_proxmox_storage }}/tmp/{{ imagebuilder_id_base }}"
        state: absent
      delegate_to: proxmox_server
      become: true

    - name: Remove Windows guestfish injection helper
      ansible.builtin.file:
        path: "/tmp/windows-guestfish-inject.sh"
        state: absent
      delegate_to: "{{ target_host }}"
      ignore_errors: true # noqa: ignore-errors
