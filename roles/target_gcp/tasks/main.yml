---
- name: (TARGET-GCP) Prepare and convert templates to GCP Compute Engine format
  tags:
    - build_targets
    - build_target_gcp
  block:

    - name: Validate OS family
      ansible.builtin.fail:
        msg: "os_type must be 'linux' or 'windows'"
      when: os_type not in ["linux", "windows"]

    - name: Validate GCP project
      ansible.builtin.fail:
        msg: "imagebuilder_env_gcp_project must be set"
      when: not imagebuilder_env_gcp_project or imagebuilder_env_gcp_project == ""

    - name: Validate GCP bucket
      ansible.builtin.fail:
        msg: "imagebuilder_env_gcp_bucket must be set"
      when: not imagebuilder_env_gcp_bucket or imagebuilder_env_gcp_bucket == ""

    - name: Set GCP image name
      ansible.builtin.set_fact:
        target_gcp_gcp_image_name: "{{ imagebuilder_env_gcp_image_name | default(id) }}"

    ###########################################################################
    # LINUX PATH
    ###########################################################################
    - name: Linux | Prepare Google Cloud Ops Agent and drivers
      when: os_type == "linux"
      block:

        - name: Linux | Copy base QCOW2 for GCP
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.gcp.{{ imagebuilder_profile_hash }}.qcow2"
            mode: "0644"
            remote_src: true

        - name: Linux | Install Google Cloud Ops Agent and metadata server utils
          ansible.builtin.command: >
            virt-customize
            -a "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.gcp.{{ imagebuilder_profile_hash }}.qcow2"
            --install google-cloud-cli,google-osconfig-agent,curl,wget
            --run-command 'systemctl enable google-osconfig-agent || systemctl enable google-startup-scripts || true'
            --run-command 'echo "add_drivers+= \" virtio virtio_blk virtio_net \"" > /etc/dracut.conf.d/gcp.conf'
            --run-command 'kver=$(ls /lib/modules | sort -V | tail -1); dracut -f --kver "$kver" --add-drivers "virtio virtio_blk virtio_net" 2>&1 || true'
            --run-command 'touch /.autorelabel'
            --selinux-relabel
          register: target_gcp_linux_customize
          changed_when: true

        - name: Linux | Show virt-customize output
          ansible.builtin.debug:
            var: target_gcp_linux_customize.stdout

        - name: Linux | Convert QCOW2 to raw (GCP format)
          ansible.builtin.command: >
            qemu-img convert
            -f qcow2
            -O raw
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.gcp.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
          register: target_gcp_linux_convert
          changed_when: true

        - name: Linux | Show conversion output
          ansible.builtin.debug:
            var: target_gcp_linux_convert.stdout

    ###########################################################################
    # WINDOWS PATH
    ###########################################################################
    - name: Windows | Prepare Windows for GCP Compute Engine
      when: os_type == "windows"
      block:

        - name: Windows | Copy base QCOW2 for GCP
          ansible.builtin.copy:
            src: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
            dest: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.gcp.{{ imagebuilder_profile_hash }}.qcow2"
            mode: "0644"
            remote_src: true

        - name: Windows | Prepare GCP metadata configuration
          ansible.builtin.copy:
            dest: "/tmp/gcp-config.ps1"
            mode: "0644"
            content: |
              # GCP Windows Configuration
              Write-Host "Configuring Windows for GCP Compute Engine..."

              # Enable required Windows features
              $features = @(
                  'NetFx4ServerFeatures',
                  'NetFx4',
                  'MSMQ-Server'
              )

              foreach ($feature in $features) {
                  try {
                      Install-WindowsFeature $feature -NoRestart -ErrorAction SilentlyContinue | Out-Null
                      Write-Host "Enabled: $feature"
                  } catch {
                      Write-Host "Feature $feature not available: $_"
                  }
              }

              Write-Host "GCP Windows configuration completed"

        - name: Windows | Render unattend.xml
          ansible.builtin.template:
            src: "{{ windows_unattend_template }}"
            dest: "/tmp/unattend.xml"
            mode: "0644"

        - name: Windows | Copy Windows guestfish injection helper
          ansible.builtin.copy:
            src: "roles/imagebuilder/files/windows-guestfish-inject.sh"
            dest: "/tmp/windows-guestfish-inject.sh"
            mode: "0755"
          delegate_to: "{{ run_on | default('localhost') }}"

        - name: Windows | Inject GCP configuration + unattend.xml
          ansible.builtin.command: >
            /tmp/windows-guestfish-inject.sh
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.gcp.{{ imagebuilder_profile_hash }}.qcow2"
            "/tmp/unattend.xml:/Windows/Panther/Unattend.xml"
            "/tmp/gcp-config.ps1:/Windows/Temp/gcp-config.ps1"
          register: target_gcp_windows_inject
          changed_when: true
          delegate_to: "{{ run_on | default('localhost') }}"

        - name: Windows | Show guestfish output
          ansible.builtin.debug:
            var: target_gcp_windows_inject.stdout

        - name: Windows | Convert QCOW2 to raw (GCP format)
          ansible.builtin.command: >
            qemu-img convert
            -f qcow2
            -O raw
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.gcp.{{ imagebuilder_profile_hash }}.qcow2"
            "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
          register: target_gcp_windows_convert
          changed_when: true

        - name: Windows | Show conversion output
          ansible.builtin.debug:
            var: target_gcp_windows_convert.stdout

    ###########################################################################
    # VALIDATION AND OUTPUT
    ###########################################################################

    - name: Validate converted raw image
      ansible.builtin.stat:
        path: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
      register: target_gcp_gcp_image_stat

    - name: Show GCP raw image details
      ansible.builtin.debug:
        msg: |
          GCP Compute Engine Image Created Successfully!
          Path: {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw
          Size: {{ (target_gcp_gcp_image_stat.stat.size / 1024 / 1024 / 1024) | round(2) }} GB
          OS Type: {{ os_type | capitalize }}

          Next steps to create GCP image:
          1. Upload to GCS: gsutil cp {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw gs://{{ imagebuilder_env_gcp_bucket }}/
          2. Create image: gcloud compute images create {{ target_gcp_gcp_image_name }} --source-uri=gs://{{ imagebuilder_env_gcp_bucket }}/{{ imagebuilder_id_base }}.raw --project={{ imagebuilder_env_gcp_project }}
          3. Create instance: gcloud compute instances create test-{{ target_gcp_gcp_image_name }} --image={{ target_gcp_gcp_image_name }} --zone={{ imagebuilder_env_gcp_zone }} --project={{ imagebuilder_env_gcp_project }}
      when: target_gcp_gcp_image_stat.stat.exists

    - name: Fail if image was not created
      ansible.builtin.fail:
        msg: "Failed to create GCP raw image at {{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.raw"
      when: not target_gcp_gcp_image_stat.stat.exists

  rescue:
    - name: (TARGET-GCP) Rescue on failure
      ansible.builtin.debug:
        msg: "Rescue: error during GCP image creation"

  always:
    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/windows-guestfish-inject.sh"
        - "/tmp/gcp-config.script"
        - "/tmp/gcp-config.ps1"
        - "/tmp/unattend.xml"
      ignore_errors: true # noqa: ignore-errors

    - name: Remove intermediate QCOW2
      ansible.builtin.file:
        path: "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.gcp.{{ imagebuilder_profile_hash }}.qcow2"
        state: absent
      ignore_errors: true # noqa: ignore-errors
