# ansible-lint: ignore=line-length

# RedHat-Based Systems
- name: (BUILDAUX, redhat)
  tags:
      - build_aux
  block:
      - name: (BUILDAUX, redhat) create build directories
        ansible.builtin.file:
            path: "{{ file }}"
            state: directory
            mode: "0755"
        loop_control:
            loop_var: file
        loop:
            - "{{ imagebuilder_build_basedir }}/build"
            - "{{ imagebuilder_build_basedir }}/build/mnt"
      - name: (BUILDAUX, redhat) remove existing aux ISO (if it exists)
        ansible.builtin.file:
            path: "{{ imagebuilder_build_basedir }}/build/aux.iso"
            state: absent

      - name: (BUILDAUX, redhat) create temporary iso contents dir
        ansible.builtin.file:
            path: "{{ imagebuilder_build_basedir }}/build/iso_contents"
            state: directory
            mode: "0755"

      - name: (BUILDAUX, redhat) use default ks if none provided
        ansible.builtin.include_tasks:
            file: buildprofile/rhel.yml

      - name: (BUILDAUX, redhat) Copy kickstart file (RedHat) to ISO contents
        ansible.builtin.copy:
            content: "{{ ks }}"
            dest: "{{ imagebuilder_build_basedir }}/build/iso_contents/ks.cfg"
            mode: "0644"
        become: true
      - name: (BUILDAUX, redhat) Copy kickstart file (RedHat) to http directory
        ansible.builtin.copy:
            content: "{{ ks }}"
            dest: "{{ imagebuilder_build_httpdir }}/ks.cfg"
            mode: "0644"
        become: true

      - name: (BUILDAUX, redhat) Build aux ISO from contents (label OEMDRV)
        ansible.builtin.command: >
          genisoimage -output aux.iso -volid OEMDRV -joliet -rock .
        args:
            chdir: "{{ imagebuilder_build_basedir }}/build/iso_contents"
            creates: "{{ imagebuilder_build_basedir }}/build/aux.iso"
        register: mkiso # noqa: var-naming
        failed_when: mkiso.rc != 0

      - name: (BUILDAUX, redhat) Move aux ISO to build directory
        ansible.builtin.command: >
          mv {{ imagebuilder_build_basedir }}/build/iso_contents/aux.iso {{ imagebuilder_build_basedir }}/build/aux.iso
        args:
            creates: "{{ imagebuilder_build_basedir }}/build/aux.iso"

      - name: (BUILDAUX, redhat) Remove temporary ISO contents directory
        ansible.builtin.file:
            path: "{{ imagebuilder_build_basedir }}/build/iso_contents"
            state: absent
        become: true
