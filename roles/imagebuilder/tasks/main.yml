---
- name: (MAIN) setup to get facts for the build system
  ansible.builtin.setup:

- name: (MAIN) Display build banner
  ansible.builtin.include_tasks: banner.yml
  vars:
    imagebuilder_banner_message: "Starting build: {{ imagebuilder_id_base }}"

- name: (MAIN) Check if environmental variables file exists in the standard location
  ansible.builtin.stat:
    path: "{{ imagebuilder_envfile_path }}"
  register: imagebuilder_envfile_stat
  failed_when: not imagebuilder_envfile_stat.stat.exists
  changed_when: false

- name: (MAIN) Load env file (a=b format)
  ansible.builtin.slurp:
    src: "{{ imagebuilder_envfile_path }}"
  register: imagebuilder_raw_env
  changed_when: false

- name: (MAIN) Convert env file to dict
  ansible.builtin.set_fact:
    imagebuilder_env:
      >-
        {{
          imagebuilder_raw_env.content
          | b64decode
          | regex_replace('^\\s*#.*$', '', multiline=True)
          | regex_replace('^\\s*$', '', multiline=True)
          | regex_replace('=', ': ', multiline=True)
          | from_yaml
        }}

- name: (MAIN) Map imagebuilder_env.* into individual vars
  ansible.builtin.set_fact:
    imagebuilder_env_qemu_ip: "{{ imagebuilder_env.IMAGEBUILDER_ENV_QEMU_IP }}"
    imagebuilder_env_build_path: "{{ imagebuilder_env.IMAGEBUILDER_ENV_BUILD_PATH }}"
    imagebuilder_env_ansible_user: "{{ imagebuilder_env.IMAGEBUILDER_ENV_ANSIBLE_USER }}"
    imagebuilder_env_ansible_password: "{{ imagebuilder_env.IMAGEBUILDER_ENV_ANSIBLE_PASSWORD }}"
    imagebuilder_env_linux_admin_user: "{{ imagebuilder_env.IMAGEBUILDER_ENV_LINUX_ADMIN_USER }}"
    imagebuilder_env_linux_admin_password: "{{ imagebuilder_env.IMAGEBUILDER_ENV_LINUX_ADMIN_PASSWORD }}"
    imagebuilder_env_win_admin_user: "{{ imagebuilder_env.IMAGEBUILDER_ENV_WIN_ADMIN_USER }}"
    imagebuilder_env_win_admin_password: "{{ imagebuilder_env.IMAGEBUILDER_ENV_WIN_ADMIN_PASSWORD }}"
    imagebuilder_env_ansible_key: "{{ imagebuilder_env.IMAGEBUILDER_ENV_ANSIBLE_KEY }}"
    imagebuilder_env_proxmox_server: "{{ imagebuilder_env.IMAGEBUILDER_ENV_PROXMOX_SERVER }}"
    imagebuilder_env_proxmox_user: "{{ imagebuilder_env.IMAGEBUILDER_ENV_PROXMOX_USER }}"
    imagebuilder_env_proxmox_password: "{{ imagebuilder_env.IMAGEBUILDER_ENV_PROXMOX_PASSWORD }}"
    imagebuilder_env_proxmox_storage: "{{ imagebuilder_env.IMAGEBUILDER_ENV_PROXMOX_STORAGE }}"
    imagebuilder_env_proxmox_node: "{{ imagebuilder_env.IMAGEBUILDER_ENV_PROXMOX_NODE }}"
    imagebuilder_env_build_memory: "{{ imagebuilder_env.IMAGEBUILDER_ENV_BUILD_MEMORY | default(8192) }}"
    imagebuilder_env_build_cpu: "{{ imagebuilder_env.IMAGEBUILDER_ENV_BUILD_CPU | default(4) }}"
    imagebuilder_env_vsphere_password: "{{ imagebuilder_env.IMAGEBUILDER_ENV_VSPHERE_PASSWORD }}"
    imagebuilder_env_vsphere_username: "{{ imagebuilder_env.IMAGEBUILDER_ENV_VSPHERE_USERNAME }}"
    imagebuilder_env_vsphere_vcenter: "{{ imagebuilder_env.IMAGEBUILDER_ENV_VSPHERE_VCENTER }}"
    imagebuilder_env_vsphere_datacenter: "{{ imagebuilder_env.IMAGEBUILDER_ENV_VSPHERE_DATACENTER }}"
    imagebuilder_env_vsphere_datastore: "{{ imagebuilder_env.IMAGEBUILDER_ENV_VSPHERE_DATASTORE }}"
    imagebuilder_env_rhsm_userid: "{{ imagebuilder_env.IMAGEBUILDER_ENV_RHSM_USERID }}"
    imagebuilder_env_rhsm_password: "{{ imagebuilder_env.IMAGEBUILDER_ENV_RHSM_PASSWORD }}"

- name: (MAIN) Assert required build variables are defined
  ansible.builtin.assert:
    that:
      - os is defined and os.iso is defined and os.iso | trim | length > 0
      - imagebuilder_env_qemu_ip is defined and imagebuilder_env_qemu_ip | trim | length > 0
      - imagebuilder_env_build_path is defined and imagebuilder_env_build_path | trim | length > 0
      - imagebuilder_env_ansible_user is defined and imagebuilder_env_ansible_user | trim | length > 0
      - imagebuilder_env_ansible_password is defined and imagebuilder_env_ansible_password | trim | length > 0
      - imagebuilder_env_linux_admin_user is defined and imagebuilder_env_linux_admin_user | trim | length > 0
      - imagebuilder_env_linux_admin_password is defined and imagebuilder_env_linux_admin_password | trim | length > 0
      - imagebuilder_env_win_admin_user is defined and imagebuilder_env_win_admin_user | trim | length > 0
      - imagebuilder_env_win_admin_password is defined and imagebuilder_env_win_admin_password | trim | length > 0
      - imagebuilder_env_ansible_key is defined and imagebuilder_env_ansible_key | trim | length > 0
      - imagebuilder_env_vsphere_password is defined and imagebuilder_env_vsphere_password | trim | length > 0
      - imagebuilder_env_vsphere_username is defined and imagebuilder_env_vsphere_username | trim | length > 0
      - imagebuilder_env_vsphere_vcenter is defined and imagebuilder_env_vsphere_vcenter | trim | length > 0
      - imagebuilder_env_vsphere_datacenter is defined and imagebuilder_env_vsphere_datacenter | trim | length > 0
      - imagebuilder_env_vsphere_datastore is defined and imagebuilder_env_vsphere_datastore | trim | length > 0
      - imagebuilder_env_rhsm_userid is defined and imagebuilder_env_rhsm_userid | trim | length > 0
      - imagebuilder_env_rhsm_password is defined and imagebuilder_env_rhsm_password | trim | length > 0
    fail_msg: "(MAIN) One or more required variables are not defined correctly."
    success_msg: "(MAIN) All required variables are defined. Proceeding with build."

- name: (MAIN) Get the system ready for the build
  ansible.builtin.include_tasks: setup.yml

- name: (MAIN) add default build steps if none are defined defined by the build task
  ansible.builtin.set_fact:
    imagebuilder_build: "{{ build | default(imagebuilder_build_default) }}"

- name: (MAIN) Build the image profile based on our configuration
  ansible.builtin.include_tasks: buildprofile.yml

- name: (MAIN) Restore Image(s) if they exist
  ansible.builtin.include_tasks: restore.yml

- name: (MAIN) Perform any downloads needed for the build
  ansible.builtin.include_role:
    name: "{{ rolename }}"
    tasks_from: download.yml
  loop: "{{ ansible_play_role_names }}"
  loop_control:
    loop_var: rolename

- name: (MAIN) Perform the defined build
  when: not imagebuilder_restored_from_custom_image | default(false)
  block:
    - name: (MAIN) include build roles if any are defined
      ansible.builtin.include_role:
        name: imagebuilder
        tasks_from: "glue/glue.yml"
      vars:
        imagebuilder_stage: "{{ imagebuilder_buildtask.name }}"
        imagebuilder_task_vars: "{{ imagebuilder_buildtask.task_vars | default({}) }}"
      loop: "{{ imagebuilder_build | default([]) }}"
      loop_control:
        loop_var: imagebuilder_buildtask
    - name: (QEMU) wait for 60 seconds for the system to be shutdown before we try to save the image
      ansible.builtin.wait_for:
        timeout: 60
    # Ensure qcow2 is not open by any process
    - name: Check for open handles on qcow2
      ansible.builtin.shell: lsof "{{ imagebuilder_build_imagedir }}/{{ imagebuilder_id_base }}.x86_64.qcow2" || true
      register: imagebuilder_qcow2_lsof
      changed_when: false
      delegate_to: localhost

    - name: Fail if qcow2 is still open
      ansible.builtin.debug:
        msg: "qcow2 still open by a process: {{ imagebuilder_qcow2_lsof.stdout }}"

    # Flush host page cache before conversion
    - name: Sync host filesystem
      ansible.builtin.command: sync
      changed_when: false
      delegate_to: localhost

    - name: (QEMU) save custom image
      block:
        - name: (QEMU) convert custom image with free block cleanup
          ansible.builtin.command: qemu-img convert -f qcow2 -O qcow2 "{{ imagebuilder_build_imagedir }}/{{ imagebuilder_id_base }}.x86_64.qcow2" "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2.tmp"
          changed_when: true

        - name: (QEMU) finalize custom image
          ansible.builtin.command: mv "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2.tmp" "{{ imagebuilder_build_savedir }}/{{ imagebuilder_id_base }}.custom.{{ imagebuilder_profile_hash }}.qcow2"
          changed_when: true

    # - name: (MAIN) cleanup build path
    #   ansible.builtin.file:
    #     path: "{{ imagebuilder_env_build_path }}/{{ imagebuilder_id_base }}"
    #     state: absent
    #   become: true
    #   tags:
    #     - build_cleanup

  rescue:

    - name: "(MAIN) Show error on failure"
      ansible.builtin.debug:
        msg: >-
          (MAIN) Task '{{ ansible_failed_task }}' failed.
          {{ ansible_failed_result.msg | default('no additional message') }}
  always:

    - name: (MAIN) Display Webserver job_id
      ansible.builtin.debug:
        msg: "(MAIN) Webserver jobid is {{ webserver.ansible_job_id }} "
      when: webserver is defined and webserver.ansible_job_id is defined

    - name: (MAIN) kill dangly web servers
      ansible.builtin.shell: |
        kill {{ webserver.ansible_job_pid | default('') }} 2>/dev/null || true
        sleep 5
        kill -9 {{ webserver.ansible_job_pid | default('') }} 2>/dev/null || true
      when: webserver is defined and webserver.ansible_job_pid is defined
      changed_when: false
