---
- name: (PATCHING-PATCH, Common) Set the retry count
  ansible.builtin.set_fact:
    retry_count: "{{ 0 if retry_count is undefined else retry_count | int + 1 }}" # noqa: var-naming
    waitfor_host: "{{ hostvars.get(delegate, {}).get('ansible_host') | default(ansible_host) }}" # noqa: var-naming
    waitfor_port: "{{ hostvars.get(delegate, {}).get('ansible_port') | default(ansible_port) }}" # noqa: var-naming

- name: (PATCHING-PATCH, Common) Wait for admin port to be available
  ansible.builtin.wait_for:
    host: "{{ waitfor_host }}"
    port: "{{ waitfor_port }}"
    delay: 10
    timeout: 1200
    state: started
  delegate_to: "{{ run_on | default('localhost') }}"

- name: PATCHING_PATCH- Apply OS patches
  ansible.builtin.include_tasks: "patching/patch/{{ ansible_facts['os_family'] | lower }}.yml"
