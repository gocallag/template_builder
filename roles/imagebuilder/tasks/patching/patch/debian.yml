---
- name: (PATCHING) Setup variables and facts
  block:


  # Debian-Based Systems
  - block:
    - name: (PATCHING-PATCH, debian, ubuntu) Configure pending packages
      command: "dpkg --configure -a"
      become: true
      delegate_to: "{{ delegate | default(omit)}}"

    # Register the result as 'apt' for debugging and to use its output in subsequent tasks (e.g., checking for errors or changes).
    - name: (PATCHING-PATCH, debian, ubuntu) Update the system
      apt:
        name: "*"
        state: latest
        update_cache: yes
      become: true
      register: apt
      delegate_to: "{{ delegate | default(omit)}}"
    - name: (PATCHING-PATCH, debian, ubuntu) Debug apt output
      debug: var=apt

    - name: (PATCHING-PATCH, debian, ubuntu) Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: nr
      delegate_to: "{{ delegate | default(omit)}}"

    - name: (PATCHING-PATCH, debian, ubuntu) Reboot if required
      block:
      - reboot:
          reboot_timeout: 1200
        become: true
        delegate_to: "{{ delegate | default(omit)}}"

      - set_fact:
          ponder: false

      - name: (PATCHING-PATCH, debian, ubuntu) Wait for admin port (22) to be available
        wait_for:
          host: "{{ waitfor_host }}"
          port: "{{ waitfor_port }}"
          delay: 10
          timeout: 1200
          state: started
        delegate_to: "{{ run_on | default('localhost') }}"
      when:
      - nr is defined
      - nr.stat.exists == true
    when: ansible_facts['os_family'] | lower == "debian"
