      # Ubuntu Hardening Tasks
      - name: (HARDENING) Ensure AppArmor is enabled
        ansible.builtin.command: aa-status
        become: true
        register: apparmor_status # noqa: var-naming
        changed_when: false
        failed_when: "'enforce' not in apparmor_status.stdout"
        when: ansible_facts['os_family'] | lower == 'debian'
        delegate_to: bob_build

