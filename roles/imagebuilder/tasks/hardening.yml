      - name: (HARDENING) Ensure permissions on /etc/passwd are configured
        ansible.builtin.file:
            path: /etc/passwd
            owner: root
            group: root
            mode: '0644'
        become: true
        when: ansible_facts['os_family'] | lower == 'debian'
        delegate_to: bob_build

      - name: (HARDENING) Ensure no unowned files or directories exist
        ansible.builtin.command: find / -nouser
        become: true
        register: unowned_files # noqa: var-naming
        changed_when: false
        failed_when: unowned_files.stdout != ""
        when: ansible_facts['os_family'] | lower == 'debian'
        delegate_to: bob_build


      # Windows Hardening Tasks
      - name: (HARDENING) Ensure Windows Firewall and Defender are enabled
        when: ansible_facts['os_family'] | lower == 'windows'
        block:
            - name: (HARDENING) Enable Windows Firewall
              ansible.windows.win_shell: Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled True
              become: true
              changed_when: true
              become_user: SYSTEM
              become_method: ansible.builtin.runas
              delegate_to: bob_build

            - name: (HARDENING) Validate Windows Firewall is enabled
              ansible.windows.win_shell: Get-NetFirewallProfile -Profile Domain,Public,Private | Select-Object -Property Enabled
              become: true
              become_user: SYSTEM
              become_method: ansible.builtin.runas
              register: firewall_status # noqa: var-naming
              changed_when: true
              failed_when: "'True' not in firewall_status.stdout"
              delegate_to: bob_build

            - name: (HARDENING) Ensure Windows Defender is enabled and up-to-date
              ansible.windows.win_shell: Set-MpPreference -DisableRealtimeMonitoring $false
              become: true
              become_user: SYSTEM
              changed_when: true
              become_method: ansible.builtin.runas
              delegate_to: bob_build


      - name: (HARDENING) Ensure audit logging is enabled
        ansible.windows.win_shell: AuditPol /set /category:"Logon/Logoff" /success:enable /failure:enable
        become: true
        become_user: SYSTEM
        become_method: ansible.builtin.runas
        changed_when: true
        when: ansible_facts['os_family'] | lower == 'windows'
        delegate_to: bob_build

      - name: (HARDENING) Ensure account lockout threshold is configured
        ansible.windows.win_shell: net accounts /lockoutthreshold:5
        become: true
        become_user: SYSTEM
        become_method: ansible.builtin.runas
        changed_when: true
        when: ansible_facts['os_family'] | lower == 'windows'
        delegate_to: bob_build

