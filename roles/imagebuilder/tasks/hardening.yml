---
- name: (HARDENING) Initial Setup
  tags:
      - build_customise
  block:
      - name: (HARDENING) Run setup
        ansible.builtin.setup:
        delegate_to: bob_build

    # Red Hat Hardening Tasks
      - name: (HARDENING) Ensure SELinux is enforcing
        ansible.builtin.command: setenforce 1
        become: true
        changed_when: true
        when: ansible_facts['os_family'] == 'RedHat' and ansible_facts['selinux']['status'] != 'enforcing'
        delegate_to: bob_build

      - name: (HARDENING) Validate SELinux is enforcing
        ansible.builtin.command: getenforce
        become: true
        register: selinux_status # noqa: var-naming
        changed_when: false
        failed_when: selinux_status.stdout != "Enforcing"
        when: ansible_facts['os_family'] == 'RedHat'
        delegate_to: bob_build

      - name: (HARDENING) Ensure firewalld is enabled and running
        ansible.builtin.service:
            name: firewalld
            state: started
            enabled: true
        become: true
        when: ansible_facts['os_family'] == 'RedHat'
        delegate_to: bob_build

      - name: (HARDENING) Ensure permissions on /etc/passwd are configured
        ansible.builtin.file:
            path: /etc/passwd
            owner: root
            group: root
            mode: '0644'
        become: true
        when: ansible_facts['os_family'] == 'RedHat'
        delegate_to: bob_build

      - name: (HARDENING) Ensure no unowned files or directories exist
        ansible.builtin.command: find / -nouser
        become: true
        register: unowned_files # noqa: var-naming
        changed_when: false
        failed_when: unowned_files.stdout != ""
        when: ansible_facts['os_family'] | lower == 'redhat'
        delegate_to: bob_build

      - name: (HARDENING) Ensure password expiration is 90 days or less
        ansible.builtin.lineinfile:
            path: /etc/login.defs
            regexp: '^PASS_MAX_DAYS'
            line: 'PASS_MAX_DAYS 90'
        become: true
        when: ansible_facts['os_family'] | lower in ['redhat', 'debian']
        delegate_to: bob_build

      - name: (HARDENING) Ensure auditd service is enabled and running
        ansible.builtin.service:
            name: auditd
            state: started
            enabled: true
        become: true
        when: ansible_facts['os_family'] | lower in ['redhat']
        delegate_to: bob_build

      - name: (HARDENING) Disable root login via SSH
        ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^PermitRootLogin'
            line: 'PermitRootLogin no'
        become: true
        when: ansible_facts['os_family'] | lower in ['redhat', 'debian']
        delegate_to: bob_build

      - name: (HARDENING) Configure strong password policies
        ansible.builtin.lineinfile:
            path: /etc/security/pwquality.conf
            regexp: '^minlen'
            line: 'minlen = 14'
        become: true
        when: ansible_facts['os_family'] | lower in ['redhat']
        delegate_to: bob_build

      - name: (HARDENING) Harden kernel parameters
        ansible.posix.sysctl:
            name: "{{ item.name }}"
            value: "{{ item.value }}"
            state: present
        become: true
        loop:
            - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
            - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
            - { name: 'net.ipv4.tcp_syncookies', value: '1' }
        when: ansible_facts['os_family'] | lower in ['redhat', 'debian']
        delegate_to: bob_build

      - name: (HARDENING) Restrict access to cron
        ansible.builtin.file:
            path: /etc/cron.deny
            state: absent
        become: true
        when: ansible_facts['os_family'] | lower in ['redhat', 'debian']
        delegate_to: bob_build

      - name: (HARDENING) Restrict access to at
        ansible.builtin.file:
            path: /etc/at.deny
            state: absent
        become: true
        when: ansible_facts['os_family'] | lower in ['redhat', 'debian']
        delegate_to: bob_build

      # - name: (HARDENING) Ensure security updates are installed
      #   package:
